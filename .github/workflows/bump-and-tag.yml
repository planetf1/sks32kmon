name: Bump version and tag

# Bumps version, creates a tag, and triggers the release workflow
# (binary builds + Homebrew + crates.io publish).
#
# Triggers:
#   - Every push to main bumps a patch version automatically.
#   - Manual dispatch: patch/minor/major.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version component to bump'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  release:
    name: Bump version and tag
    runs-on: ubuntu-latest
    # Guard: the version-bump commit must not re-trigger this workflow.
    if: "!startsWith(github.event.head_commit.message, 'chore: release v')"
    outputs:
      new_version: ${{ steps.bump.outputs.new }}
    env:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version in Cargo.toml
        id: bump
        env:
          BUMP_KIND: ${{ inputs.bump || 'patch' }}
        run: |
          current=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          IFS='.' read -r major minor patch <<< "$current"
          case "$BUMP_KIND" in
            major) new="$((major+1)).0.0" ;;
            minor) new="$major.$((minor+1)).0" ;;
            patch) new="$major.$minor.$((patch+1))" ;;
          esac
          sed -i "s/^version = \"$current\"/version = \"$new\"/" Cargo.toml
          echo "old=$current" >> "$GITHUB_OUTPUT"
          echo "new=$new" >> "$GITHUB_OUTPUT"

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Update Cargo.lock
        run: cargo metadata --format-version 1 > /dev/null

      - name: Commit, tag, and push
        run: |
          git add Cargo.toml Cargo.lock
          git commit -m "chore: release v${{ steps.bump.outputs.new }}"
          git tag "v${{ steps.bump.outputs.new }}"
          git push origin main "v${{ steps.bump.outputs.new }}"

      - name: Trigger binary release workflow
        if: ${{ env.RELEASE_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          gh workflow run release.yml \
            --ref "v${{ steps.bump.outputs.new }}" \
            --repo "${{ github.repository }}"

      - name: Summary
        run: |
          echo "### Released v${{ steps.bump.outputs.new }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Bumped \`${{ steps.bump.outputs.old }}\` → \`${{ steps.bump.outputs.new }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Tag \`v${{ steps.bump.outputs.new }}\` pushed — binary build + Homebrew triggered." >> "$GITHUB_STEP_SUMMARY"

  publish:
    name: Publish to crates.io
    needs: release
    uses: ./.github/workflows/publish.yml
    with:
      ref: "v${{ needs.release.outputs.new_version }}"
    secrets:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
